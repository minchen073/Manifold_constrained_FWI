# 训练检查点目录（相对于 Manifold_constrained_FWI/training/ 或绝对路径）
checkpoint: "runs/curvevel_b_ddpm_20260412_122045/checkpoint_epoch_0300"

# DDIM 推理步数（200 已足够，1000 非常慢）
steps: 5

# 一次生成样本数
batch_size: 8

# 随机种子
seed: 1

# DDIM eta：0.0 = 确定性采样；>0 引入随机性scripts/sample_ddim_curvevel_b.py

eta: 0.0

# 输出目录：null 表示自动用时间戳生成在 exp/test_generation/<timestamp>/
# out_dir: null

# 速度归一化参数（null 表示从训练 config 自动读取）
