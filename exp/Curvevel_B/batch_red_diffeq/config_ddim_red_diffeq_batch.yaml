# =============================================================================
# config_ddim_red_diffeq_batch.yaml — Batch evaluation of RED-DiffEq
# CurveVel-B 版本
#
# 在多个样本上运行 RED-DiffEq 优化，统计最终速度场指标：
#   μ — 优化后的物理速度场
#
# Run（Manifold_constrained_FWI 目录）:
#   uv run python exp/DDIM/ddim_red_diffeq_batch/demo_ddim_red_diffeq_batch.py \
#     --config exp/DDIM/ddim_red_diffeq_batch/config_ddim_red_diffeq_batch.yaml
# =============================================================================

device: "cuda:3"
seed: 42        # μ RNG 基准种子，第 i 个样本使用 seed+i

ddim:
  checkpoint: "training/runs/curvevel_b_ddpm_20260412_122045/checkpoint_epoch_0300"

curvevel:
  model60_path: "data/Curvevel-B/model60.npy"

initialization:
  type: "smoothed"     # "smoothed" | "homogeneous" | "linear" | "zero"
  smooth_sigma: 10.0

optimization:
  opt_steps: 300
  lr: 0.03
  reg_lambda: 0.75     # λ: weight for RED regularization
  wave_loss: "l1"       # "l1" | "mse"

red:
  max_timestep: 1000
  sigma_x0: 0.0001
  use_time_weight: false

batch:
  sample_start: 0
  sample_end: 100       # 评估 [sample_start, sample_end) 范围内的样本
  example_indices: [0, 5, 10, 25, 50]   # 保存完整可视化的样本索引

visualization:
  vel_vmin_m_s: 1500.0
  vel_vmax_m_s: 4500.0

paths:
  outdir: "demo_output"
