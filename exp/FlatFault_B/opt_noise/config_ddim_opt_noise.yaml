# =============================================================================
# demo_ddim_opt_noise.py  —  FlatFault-B 版本
#
# 优化初始噪声 z，使 DDIM 采样速度与目标在归一化 [-1,1] 空间 MSE 最小。
#
# Run（Manifold_constrained_FWI 目录）:
#   uv run python exp/FlatFault_B/edm_opt_noise/demo_ddim_opt_noise.py \
#     --config exp/FlatFault_B/edm_opt_noise/config_ddim_opt_noise.yaml
# =============================================================================

device: "cuda:0"
seed: 42

ddim:
  # 预训练模型路径（相对 Manifold_constrained_FWI/ 根目录）
  # 可以是：
  #   - 包含 model.pt + scheduler/ 的 checkpoint 目录
  #   - 直接指向 model.pt 文件（此时 scheduler 用下方 scheduler_config 参数构建）
  model_path: "pretrained_model/FlatFault-B_DDIM/model.pt"
  # DDIM 推理步数
  num_steps: 6
  # DDIM eta：0.0 = 确定性采样
  eta: 0.0
  # 当 model_path 为独立 .pt 文件时，用下方参数构建 DDPMScheduler
  scheduler_config:
    num_train_timesteps: 1000
    beta_start: 0.0001
    beta_end: 0.02
    beta_schedule: "linear"
    prediction_type: "epsilon"
    timestep_spacing: "leading"

flatfault:
  # FlatFault-B 数据文件（相对 Manifold_constrained_FWI/ 根目录）
  data_path: "data/FlatFault-B/vel8_1_0.npy"
  sample_index: 0

optimization:
  seed_z: 42
  opt_steps: 300
  lr: 0.02
  snapshots: 30
  reg_weight: 0  # χ² 先验正则化权重，设为 0 则关闭

visualization:
  vel_vmin_m_s: 1500.0
  vel_vmax_m_s: 4500.0

paths:
  outdir: "demo_output"
