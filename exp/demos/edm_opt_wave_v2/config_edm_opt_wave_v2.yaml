# =============================================================================
# edm_opt_wave v2
#
# 与 v1 唯一区别：z 的初始化改为光滑速度场加噪反转，而非纯随机高斯。
#
# Run（Manifold_constrained_FWI 目录）:
#   uv run python exp/edm_opt_wave_v2/demo_edm_opt_wave_v2.py \
#     --config exp/edm_opt_wave_v2/config_edm_opt_wave_v2.yaml
# =============================================================================

device: "cuda:3"
seed: 42

sampler:
  model_type: "DhariwalUNet"
  img_resolution: 70
  padding_resolution: 72
  img_channels: 1
  label_dim: 0
  model_channels: 32
  channel_mult: [1, 2, 3, 4]
  channel_mult_emb: 4
  num_blocks: 3
  attn_resolutions: [32, 16, 8]
  dropout: 0
  label_dropout: 0
  sigma_min: 0.002
  sigma_max: 80.0
  sigma_data: 0.6
  rho: 7
  alpha: 1.0

  train:
    load_model: true
    model_path: "pretrained_model/Curvevel-B_EDM/trained_model.pth"

curvevel:
  model60_path: "data/Curvevel-B/model60.npy"
  sample_index: 8

edm_sampler:
  num_steps: 6
  sigma_min: 0.002
  sigma_max: 80.0
  rho: 7.0
  alpha: 1.0
  solver: "euler"

# === z 初始化（v2 新增）===
# 流程：GaussianFilter(target_vel, smooth_sigma) → 归一化 → +sigma_mid*eps → forward ODE → z_init
z_init:
  smooth_sigma: 10.0   # 与 FWI 常用初始化一致
  sigma_mid: 1.0       # 中间时刻噪声水平；越小越贴近光滑速度场，越大高斯性越好
  num_steps: 100        # 正向 ODE 步数
  rho: 7.0
  alpha: 1.0
  seed: 8421

optimization:
  opt_steps: 100
  lr: 1
  snapshots: 10
  reg_weight: 0   # χ² 先验正则化权重，设为 0 则关闭

visualization:
  vel_vmin_m_s: 1500.0
  vel_vmax_m_s: 4500.0
  wave_plot_shot: 0

paths:
  outdir: "demo_output"
