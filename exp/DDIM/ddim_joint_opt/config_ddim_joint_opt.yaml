# =============================================================================
# config_ddim_joint_opt.yaml — Joint Alternating Optimization: Physical FWI + Latent Prior
#
# Two-variable alternating optimization:
#
#   v   (auxiliary, physical space):
#       - Init: Gaussian-smoothed velocity model
#       - Loss: L_wave(v) + λ(i) · L_guide(v; v_gen)
#       - L_guide is a direct L2 pull toward v_gen:
#           L_guide = ||v − v_gen.detach()||²
#       - λ has warmup: 0 for first warmup_steps, then linear ramp to λ_max
#
#   z   (latent code):
#       - Init: z ~ N(0, I)
#       - Loss: MSE(DDIM(z), v.detach())   [like demo_ddim_opt_noise, target = v]
#       - Keeps z on a trajectory that generates v-like velocity fields
#
# Per outer iteration:
#   1. Update z for z_steps_per_iter steps  (target = current v)
#   2. Decode v_gen = DDIM(z) with no_grad  (for v's guidance)
#   3. Update v for 1 step                  (wave loss + λ·guidance from v_gen)
# =============================================================================

device: "cuda:3"
seed: 42

ddim:
  checkpoint: "training/runs/curvevel_b_ddpm_20260412_122045/checkpoint_epoch_0300"
  num_steps: 3          # DDIM steps (shared: grad computation, v_gen decode, Phase 1 final gen)
  eta: 0.0              # DDIM eta=0 → deterministic
  num_steps_final: 3  # DDIM steps for final high-quality generation after optimization

curvevel:
  model60_path: "data/Curvevel-B/model60.npy"
  sample_index: 20

initialization:
  smooth_sigma: 10.0    # Gaussian blur sigma for v's initial model

optimization:
  total_steps: 300      # number of outer iterations
  lr_v: 0.03            # learning rate for v (same as RED-diff)
  lr_z: 0.02            # learning rate for z (same as demo_ddim_opt_noise)
  z_steps_per_iter: 1   # z update steps per outer iteration
  snapshots: 8          # number of visualization snapshots
  wave_loss: "l1"       # "l1" | "mse"

guidance:
  warmup_steps: 50     # λ=0 for first warmup_steps outer iterations
  ramp_steps: 100       # linear ramp from 0 to λ_max over this many steps after warmup
  lambda_max: 0.75      # maximum guidance weight for ||v - v_gen||² term

phase2:
  opt_steps: 100         # wave-domain latent optimization steps
  lr: 0.0005              # learning rate for z in Phase 2
  num_steps: 3          # DDIM steps for wave loss computation
  snapshots: 5           # number of evolution snapshots

visualization:
  vel_vmin_m_s: 1500.0
  vel_vmax_m_s: 4500.0
  wave_plot_shot: 0

paths:
  outdir: "demo_output"
