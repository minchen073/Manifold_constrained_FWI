# =============================================================================
# config_ddim_generate.yaml — DDIM generation quality test
#
# Generates n_samples random velocity fields from the trained DDPM checkpoint
# and visualises them in a grid.  Useful for checking generation quality at
# different (t_start, num_steps) combinations.
#
# Key insight on t_start:
#   HuggingFace set_timesteps(N) gives t_start ≈ (N-1)/N * 1000:
#     N=3  → t_start=666   (our Phase-1 default)
#     N=20 → t_start=950
#   To generate from pure noise use t_start=999 (ᾱ_999 ≈ 4e-5 ≈ 0).
# =============================================================================

device: "cuda:0"
seed: 42

ddim:
  # checkpoint: "training/runs/curvevel_b_ddpm_20260412_122045/checkpoint_epoch_0300"
  checkpoint: "training/runs/flatfault_b_ddpm_20260416_012231/checkpoint_epoch_0100"
  t_start: 999       # 999 = maximum-noise (pure Gaussian) starting timestep
  num_steps: 20       # denoising steps from t_start to 0
  eta: 0.0           # 0.0 = deterministic DDIM

generation:
  n_samples: 9       # number of random samples; laid out in a sqrt(n) × sqrt(n) grid

comparison:
  enabled: true
  step_counts: [3, 6, 10, 20, 100]   # custom sampler: fixed t_start, varying num_steps
  n_samples: 3                        # number of seeds to show (rows in comparison grid)

comparison_original:
  enabled: true
  step_counts: [3, 6, 10, 20, 100]   # standard DDIMScheduler: t_start shifts with each N
  n_samples: 3

visualization:
  vel_vmin_m_s: 1500.0
  vel_vmax_m_s: 4500.0

paths:
  outdir: "demo_output"
