# =============================================================================
# config_ddim_fwi_ssi.yaml — Alternating FWI + SSI
#
# Repeating cycle:
#   ┌─ FWI phase ──────────────────────────────────────────────────────────┐
#   │  Optimize μ directly with wave MSE (Adam + CosineAnnealing)          │
#   │  μ ← μ − lr·∇_μ L1(forward(μ), wave_target),  clamp(μ, −1, 1)      │
#   └──────────────────────────────────────────────────────────────────────┘
#        ↓  after fwi_steps iterations
#   ┌─ SSI phase ──────────────────────────────────────────────────────────┐
#   │  1. Jump:      x_tj = √ᾱ_tj · μ + √(1−ᾱ_tj) · ε                   │
#   │  2. Inversion: z_inv = ddim_inversion(x_tj)   [ascending ODE]       │
#   │  3. Generation: μ_new = ddim_sample(z_inv)    [descending ODE]      │
#   │  μ ← μ_new  (new leaf tensor, detached)                             │
#   └──────────────────────────────────────────────────────────────────────┘
#        ↓  repeat
#
# jump_step_idx: index into ascending inversion schedule (inv_sched).
#   0           → t_j smallest (near μ, low noise, x̂₀ ≈ μ)
#   inv_steps-1 → t_j largest  (near x_T, strong prior projection)
# =============================================================================

device: "cuda:3"
seed: 42

ddim:
  checkpoint: "training/runs/curvevel_b_ddpm_20260412_122045/checkpoint_epoch_0300"
  sample_steps: 100    # DDIM steps for generation (SSI phase)
  inv_steps: 100      # DDIM steps for inversion (SSI phase)

curvevel:
  model60_path: "data/Curvevel-B/model60.npy"
  sample_index: 80

initialization:
  type: "smoothed"         # "zero" | "smoothed" | "homogeneous"
  smooth_sigma: 5.0
  constant_val: 0.0

fwi:
  num_cycles: 5        # number of FWI + SSI repetitions
  fwi_steps: 60        # FWI gradient steps per cycle
  lr: 0.03
  lr_min: 0.0          # CosineAnnealing minimum lr (reset each cycle)
  wave_loss: "l1"      # "l1" | "mse"

ssi:
  jump_step_idx: 1     # index into ascending inversion timestep list
  random_eps: true     # use a fresh ε each cycle (false = fixed eps_seed)
  eps_seed: 0          # base seed; cycle i uses eps_seed + i if random_eps

visualization:
  vel_vmin_m_s: 1500.0
  vel_vmax_m_s: 4500.0
  wave_plot_shot: 0

paths:
  outdir: "demo_output"
