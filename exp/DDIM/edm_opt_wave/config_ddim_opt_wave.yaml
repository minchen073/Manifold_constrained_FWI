# =============================================================================
# demo_ddim_opt_wave.py
#
# 优化初始噪声 z，使 DDIM 得到的速度经 seismic_master_forward_modeling
# 与目标波场 MSE 最小（需 CUDA + CuPy）。
#
# Run（Manifold_constrained_FWI 目录）:
#   uv run python exp/DDIM/edm_opt_wave/demo_ddim_opt_wave.py \
#     --config exp/DDIM/edm_opt_wave/config_ddim_opt_wave.yaml
# =============================================================================

device: "cuda:3"
seed: 42

ddim:
  # 训练检查点目录（相对 Manifold_constrained_FWI/ 根目录）
  checkpoint: "training/runs/curvevel_b_ddpm_20260412_122045/checkpoint_epoch_0300"
  # DDIM 推理步数（步数少→优化更稳定但生成质量略低）
  num_steps: 6
  # DDIM eta：0.0 = 确定性采样
  eta: 0.0
  # 可选：手动指定 training yaml（null 表示自动从 checkpoint 同级目录发现）
  # training_yaml: null

curvevel:
  model60_path: "data/Curvevel-B/model60.npy"
  sample_index: 0

optimization:
  seed_z: 42
  opt_steps: 300
  lr: 0.05
  snapshots: 10
  reg_weight: 0   # χ² 先验正则化权重，设为 0 则关闭

visualization:
  vel_vmin_m_s: 1500.0
  vel_vmax_m_s: 4500.0
  wave_plot_shot: 0
  perturb_std: 0.2   # perturbation level for the 3x3 neighborhood grid

paths:
  outdir: "demo_output"
