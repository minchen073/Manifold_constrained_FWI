# =============================================================================
# demo_edm_opt_wave.py
#
# 优化初始噪声 z，使 EDM PF-ODE 得到的速度经 seismic_master_forward_modeling
# 与目标波场 MSE 最小（需 CUDA + CuPy）。
#
# Run（Manifold_constrained_FWI 目录）:
#   uv run python exp/edm_opt_wave/demo_edm_opt_wave.py \
#     --config exp/edm_opt_wave/config_edm_opt_wave.yaml
# =============================================================================

device: "cuda:3"
seed: 42

sampler:
  model_type: "DhariwalUNet"
  img_resolution: 70
  padding_resolution: 72
  img_channels: 1
  label_dim: 0
  model_channels: 32
  channel_mult: [1, 2, 3, 4]
  channel_mult_emb: 4
  num_blocks: 3
  attn_resolutions: [32, 16, 8]
  dropout: 0
  label_dropout: 0
  sigma_min: 0.002
  sigma_max: 80.0
  sigma_data: 0.6
  rho: 7
  alpha: 1.0

  train:
    load_model: true
    model_path: "pretrained_model/Curvevel-B_EDM/trained_model.pth"

curvevel:
  model60_path: "data/Curvevel-B/model60.npy"
  sample_index: 20

edm_sampler:
  num_steps: 20
  sigma_min: 0.002
  sigma_max: 80.0
  rho: 7.0
  alpha: 1.0
  solver: "euler"

optimization:
  seed_z: 42
  opt_steps: 300
  lr: 0.1
  snapshots: 10
  reg_weight: 0.001   # χ² 先验正则化权重，设为 0 则关闭

visualization:
  vel_vmin_m_s: 1500.0
  vel_vmax_m_s: 4500.0
  wave_plot_shot: 0

paths:
  outdir: "demo_output"
