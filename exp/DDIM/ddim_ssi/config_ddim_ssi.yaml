# =============================================================================
# demo_ddim_ssi.py — DDIM Stochastic Sample Inversion
#
# Flow for each of n_samples:
#   1. Load clean velocity x_0 (normalized to [-1, 1])
#   2. Jump to discrete timestep t_j:
#      x_{t_j} = sqrt(alpha_bar_{t_j}) * x_0 + sqrt(1-alpha_bar_{t_j}) * eps_i
#   3. DDIM inversion from x_{t_j} to x_{t_max} -> inverted noise z_i
#   4. DDIM sampling from z_i -> reconstructed velocity x_hat_i
#   5. Compute MAE(x_0, x_hat_i) in m/s
#
# jump_step_idx selects t_j from the ascending inversion schedule:
#   0            -> smallest t (near x_0, low noise added, poor Gaussianity)
#   num_steps-1  -> largest t (near x_T, heavy noise added, good Gaussianity)
#   Recommended: 30-50% into the schedule
#
# Run (from Manifold_constrained_FWI/):
#   uv run python exp/DDIM/ddim_ssi/demo_ddim_ssi.py \
#     --config exp/DDIM/ddim_ssi/config_ddim_ssi.yaml
# =============================================================================

device: "cuda:3"
seed: 42

ddim:
  checkpoint: "training/runs/curvevel_b_ddpm_20260412_122045/checkpoint_epoch_0300"
  inv_steps: 200       # DDIM steps for inversion (jump → t_max)
  sample_steps: 20    # DDIM steps for sampling (z → x_0)
  eta: 0.0            # 0 = deterministic DDIM
  # training_yaml: null

curvevel:
  model60_path: "data/Curvevel-B/model60.npy"
  sample_index: 0

ssi:
  n_samples: 9        # number of SSI samples (fills 3x3 grid)
  jump_step_idx: 0    # index into ascending inversion timestep list
                      # inversion_ts[jump_step_idx] = t_j
  seed_start: 0       # eps_i uses seeds seed_start, seed_start+1, ...

visualization:
  vel_vmin_m_s: 1500.0
  vel_vmax_m_s: 4500.0

paths:
  outdir: "demo_output"
