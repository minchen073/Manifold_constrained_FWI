# =============================================================================
# demo_traditional_fwi.py
#
# 传统 FWI：直接在归一化速度空间 [-1,1] 优化 v，使正演波场 MSE 最小。
#
# Run（Manifold_constrained_FWI 目录）:
#   uv run python exp/traditional_fwi/demo_traditional_fwi.py \
#     --config exp/traditional_fwi/config_traditional_fwi.yaml
# =============================================================================

device: "cuda:3"
seed: 42

target:
  model_path: "data/Curvevel-B/model60.npy"
  sample_index: 25

# 优化前波场误差诊断：对给定速度场做正演，与目标波场对比
# label "init"   → 使用本次 FWI 初始速度场（自动，无需 path）
# label "target" → 使用真值速度场（sanity check，误差应为 0）
# 也可指定任意 .npy 路径：path + index
pre_check:
  enabled: true
  shots: [0]               # 可视化哪些炮号（可写多个，如 [0, 2, 4]）
  models:
    - label: "init"
    - label: "target"

# 初始速度场构造方式
# method: smooth    — 对真值速度做高斯平滑（最常用，模拟已知先验）
# method: constant  — 全局均值速度（1D 均匀初值）
# method: gaussian  — 小幅高斯随机噪声（强烈欠定测试）
init:
  method: "smooth"
  smooth_sigma: 10.0     # 高斯平滑标准差（网格单元数）

fwi:
  iterations: 300
  lr: 0.03
  loss_type: "mse"       # mse | l1
  reg_type: "tv"   # none | tv | tikhonov
  reg_lambda: 0.01
  cosine_annealing: true
  eta_min: 0.0
  snapshots: 10

visualization:
  vel_vmin_m_s: 1500.0
  vel_vmax_m_s: 4500.0
  wave_plot_shot: 0      # 可视化哪个炮号的波场（0–4）

paths:
  outdir: "demo_output"
